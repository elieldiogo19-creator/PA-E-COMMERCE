<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="detalhes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
</head>
<body>
   <div class="container-producto">
    <div class="card">
        <div class="bloco-image">
            <img id="foto-dinamica"src="" alt="">
        </div>
    </div>
<div class="bloco-info">
    <h1 id="nome-dinamico"></h1>
    <p class="preco" id="preco-dinamico"></p>
    <div class="descricao-container">
        <strong>Descrição:</strong>
        <p id="descricao-dinamica"></p>
    </div>

    <div class="click">
        <hr class="linha-separadora">
        <button class="btn-carrinho"><i class="fas fa-shopping-cart"></i>adicionar ao carrinho</button>
        <button class="btn-comprar">Comprar Agora</button>
        <hr class="linha-separadora">
    </div>
</div>

   </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    
    const dadoOriginal = localStorage.getItem('produtoSelecionado');

    if (dadoOriginal) {
        const dados = JSON.parse(dadoOriginal);

        
        const n = document.getElementById('nome-dinamico');
        const p = document.getElementById('preco-dinamico');
        const d = document.getElementById('descricao-dinamica');
        const f = document.getElementById('foto-dinamica');

        if (n) n.innerText = dados.nome;
        if (p) p.innerText = dados.preco;
        if (d) d.innerText = dados.descricao;
        if (f) f.src = dados.image;

        console.log("Sucesso! Produto carregado.");
    } else {
        console.error("Erro: A caixa de dados está vazia!");
    }
});
</script>
</body>
</html>
